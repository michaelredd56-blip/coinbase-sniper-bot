name: Coinbase Sniper Bot

on:
  schedule:
   - cron: "3,18,33,48 * * * *" 
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Run Bot
        run: node index.js

      - name: Save Updated Portfolio
        run: |
          git config user.name "coinbase-sniper-bot"
          git config user.email "bot@users.noreply.github.com"
          git add portfolio.json
          git commit -m "Update paper trading portfolio" || echo "No portfolio changes to commit"
          git push
